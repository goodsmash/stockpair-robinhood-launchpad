[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
solc_version = "0.8.30"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 100000
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
fuzz = { runs = 10000 }
invariant = { runs = 1000, depth = 64, fail_on_revert = true }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"

[rpc_endpoints]
robinhood_testnet = "${RH_TESTNET_RPC_URL}"
robinhood_mainnet = "${RH_MAINNET_RPC_URL}"
